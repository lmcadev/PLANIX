services:
  # Base de datos local. Usa la imagen oficial de PostgreSQL y conserva los datos
  # en un volumen Docker para que no se pierdan al recrear el contenedor.
  db:
    image: postgres:16-alpine
    container_name: planix_postgres
    ports:
      - "5432:5432"
    env_file:
      - ./backend/.env.example
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # API Django para desarrollo. Se construye desde backend/Dockerfile y ejecuta
  # runserver para facilitar recarga y depuracion local.
  backend:
    build: ./backend
    container_name: planix_backend
    command: python app/manage.py runserver 0.0.0.0:8000
    # Monta el codigo fuente dentro del contenedor para trabajar sin reconstruir
    # la imagen ante cada cambio de backend.
    volumes:
      - ./backend:/code
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.example
    depends_on:
      - db

  # Interfaz React/Vite para desarrollo. Expone el servidor dev de Vite y apunta
  # sus llamadas HTTP al backend local.
  frontend:
    build: ./frontend
    container_name: planix_frontend
    # Mantiene el codigo sincronizado, pero preserva node_modules dentro del
    # contenedor para evitar conflictos con dependencias del host.
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
    depends_on:
      - backend

volumes:
  # Volumen persistente usado por PostgreSQL.
  postgres_data:
