name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_initializer:
        description: "Run database initializer after deploy"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: planix-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/planix_deploy_key
          chmod 600 ~/.ssh/planix_deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload deploy script
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
        run: |
          scp -P "$VPS_PORT" -i ~/.ssh/planix_deploy_key scripts/deploy.sh "$VPS_USER@$VPS_HOST:/tmp/planix-deploy.sh"

      - name: Deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          REPOSITORY_URL: https://github.com/${{ github.repository }}.git
          DEPLOY_BRANCH: main
          ENV_FILE_CONTENT: ${{ secrets.PRODUCTION_ENV }}
          RUN_INITIALIZER: ${{ github.event_name == 'workflow_dispatch' && inputs.run_initializer || 'false' }}
        run: |
          ssh -p "$VPS_PORT" -i ~/.ssh/planix_deploy_key "$VPS_USER@$VPS_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' REPOSITORY_URL='$REPOSITORY_URL' DEPLOY_BRANCH='$DEPLOY_BRANCH' RUN_INITIALIZER='$RUN_INITIALIZER' ENV_FILE_CONTENT='$(printf "%s" "$ENV_FILE_CONTENT" | base64 -w 0)' sh -s" <<'REMOTE'
          set -eu
          export ENV_FILE_CONTENT="$(printf "%s" "$ENV_FILE_CONTENT" | base64 -d)"
          sh /tmp/planix-deploy.sh
          REMOTE
