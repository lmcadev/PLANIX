name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_initializer:
        description: "Corre el inizializador (solo para la primera vez) de la base de datos y el servidor. No es necesario correrlo en despliegues posteriores."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: planix-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
        run: |
          missing=0
          for name in VPS_HOST VPS_USER DEPLOY_PATH PRODUCTION_ENV; do
            if [ -z "$(eval "printf '%s' \"\$$name\"")" ]; then
              echo "::error::Missing GitHub secret: $name"
              missing=1
            fi
          done
          if [ -z "$VPS_SSH_KEY_B64" ]; then
            echo "::error::Missing GitHub secret: VPS_SSH_KEY_B64"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "Deploy secrets are present."

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY_B64: ${{ secrets.VPS_SSH_KEY_B64 }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          VPS_PORT="${VPS_PORT:-22}"
          echo "Configuring SSH for $VPS_HOST:$VPS_PORT"
          mkdir -p ~/.ssh
          printf '%s' "$VPS_SSH_KEY_B64" | base64 -d > ~/.ssh/planix_deploy_key
          chmod 600 ~/.ssh/planix_deploy_key
          ssh-keygen -y -f ~/.ssh/planix_deploy_key > /dev/null
          ssh-keyscan -T 15 -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Upload deploy script
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          VPS_PORT="${VPS_PORT:-22}"
          echo "Uploading deploy script to $VPS_USER@$VPS_HOST:$VPS_PORT"
          scp -P "$VPS_PORT" -i ~/.ssh/planix_deploy_key scripts/deploy.sh "$VPS_USER@$VPS_HOST:/tmp/planix-deploy.sh"

      - name: Deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          REPOSITORY_URL: https://github.com/${{ github.repository }}.git
          DEPLOY_BRANCH: main
          ENV_FILE_CONTENT: ${{ secrets.PRODUCTION_ENV }}
          RUN_INITIALIZER: ${{ github.event_name == 'workflow_dispatch' && inputs.run_initializer || 'false' }}
        run: |
          VPS_PORT="${VPS_PORT:-22}"
          echo "Deploying branch $DEPLOY_BRANCH to $DEPLOY_PATH"
          ssh -p "$VPS_PORT" -i ~/.ssh/planix_deploy_key "$VPS_USER@$VPS_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' REPOSITORY_URL='$REPOSITORY_URL' DEPLOY_BRANCH='$DEPLOY_BRANCH' RUN_INITIALIZER='$RUN_INITIALIZER' ENV_FILE_CONTENT='$(printf "%s" "$ENV_FILE_CONTENT" | base64 -w 0)' sh -s" <<'REMOTE'
          set -eu
          export ENV_FILE_CONTENT="$(printf "%s" "$ENV_FILE_CONTENT" | base64 -d)"
          sh /tmp/planix-deploy.sh
          REMOTE
