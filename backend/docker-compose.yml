services:
  web:
    build: .
    container_name: planix_backend
    command: python app/manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    depends_on:
      - db

  front:
    build: ../frontend
    container_name: planix_frontend
    ports:
      - "5173:5173"
    env_file:
      - ../frontend/.env.example
    depends_on:
      - web
  db:
    image: postgres:16-alpine
    container_name: planix_postgres
    ports:
      - "5432:5432"
    env_file:
      - .env.example
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
